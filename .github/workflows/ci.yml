name: CI

on:
  push:
  pull_request:

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run unit tests
        run: |
          python3 -m unittest discover -v
      - name: xlfg harness self-audit
        run: |
          python3 plugins/xlfg-engineering/scripts/audit_harness.py
