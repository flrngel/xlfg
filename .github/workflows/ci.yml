name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Lint plugin frontmatter
        run: |
          python3 scripts/lint_plugin.py
      - name: Run unit tests
        run: |
          python3 -m unittest discover -v
